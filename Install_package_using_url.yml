---
- name: Install RPM using yum URL based on location
  hosts: all
  gather_facts: True
  vars:
    mysource: ''
    package_name: ''  # ie. 'https://www.domain.com/download/vx/file.rpm'
- hosts: all
  

  tasks:
  - name: Install Crodstrike.falcon 
    yum:
      name: '{{ package_name }}'
      state: present
      validate_certs: False
    become: yes
