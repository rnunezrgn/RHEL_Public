---
- name: Upgrading RPM module based on location
  hosts: all
  gather_facts: true
  become_user: root
  vars:
    package_name: ''

  tasks:
    - name: Copy RPM to install with dnf
      become: true
      copy:
        src: /tmp/wine-mono-7.2.0-1pclos2022.noarch.rpm
        dest: /var/tmp/wine-mono-7.2.0-1pclos2022.noarch.rpm
        owner: awx
        group: awx
        mode: 0644
        force: yes
        remote_src: yes
      delegate_to: ansible-1

    - name: Install RPM package
      dnf:  name=/var/tmp/wine-mono-7.2.0-1pclos2022.noarch.rpm
      when: ansible_os_family == "RedHat" and ansible_pkg_mgr == "dnf"
