---
- name: Upgrading RPM module based on location
  hosts: all
  gather_facts: true
  become_user: root
  vars:
    package_name: ''

  tasks:
    - name: Copy RPM to install with dnf
      become: true
      copy:
        src: /tmp/wine-mono-7.2.0-1pclos2022.noarch.rpm
        dest: /home/student1/wine-mono-7.2.0-1pclos2022.noarch.rpm
        owner: student1
        group: student1
        mode: 0644
        remote_src: yes
      delegate_to: ansible-1
        
    - name: Look for the file
      shell:
        cmd: ls -l /home/student1/wine*

    - name: Install RPM package {{package_name}}
      dnf:  name=/tmp/{{package_name}}
      when: ansible_os_family == "RedHat" and ansible_pkg_mgr == "dnf"
      tags: [packages, work, txt, atom]
      
    #- name: Update RPM
    #  yum:
    #    name: "/var/tmp/{{package_name}}"
    #    state: latest
