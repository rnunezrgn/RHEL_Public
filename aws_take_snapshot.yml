---
- name: Clone AWS instances
  hosts: all
  gather_facts: false
  vars:
    default_count: '3'

  pre_tasks:
    - name: Default to 3 snapshots if COUNT is not defined.
      set_fact:
        COUNT: "{{ default_count }}"
      when: COUNT is not defined

    - name: Verify incremental type (daily, weekly, monthly)
      fail:
        msg: "INCREMENTAL is not defined.  Allowed values are daily, weekly, or monthly.  Exiting."
      when: INCREMENTAL is not defined or INCREMENTAL != 'daily' and INCREMENTAL != 'weekly' and INCREMENTAL != 'monthly'
  
  tasks:
    - name: Get instances id with tag {{servername}} in {{region}}
      amazon.aws.ec2_instance_info:
       region: "{{region}}"
       filters:
         "tag:Name": "{{servername}}"
         instance-state-name: [ "running"]
         "tag:Contact": "{{my_email_address}}"

      register: instance_info
    - name: Getting instance ID to create AWS-Snapshot
      ansible.builtin.debug:
         msg: "{{instance_info.instances[0].instance_id}}"
      when: instance_info.instances[0].instance_id is defined

#    - name: Snapshot the instance.
