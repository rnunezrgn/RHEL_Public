#        instance_id: "{{ instance_info.instances[0].instance_id }}"
#        device_name: "{{ item.root_device_name }}"
#        description: "awsbackup snapshot taken on {{ ansible_date_time.date }} at {{ ansible_date_time.time }} for Instance ID: {{ instance_info.instances[0].instance_id }}"
