- name: Prevent https://console.redhat.com/ansible/automation-hub/token from expiring
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    url_name: "https://sso.redhat.com/auth/realms/redhat-external/protocol/openid-connect/token"
    user_token: ""
    console_user: ""
    console_password: ""

  tasks:
    - name: Prevent "{{ url_name }}" from expiring
      ansible.builtin.raw: curl -ku "{{console_user}}":"{{console_password}}" -k "{{ url_name }}" -d grant_type=refresh_token -d client_id="cloud-services" -d refresh_token="{{ user_token }}" --fail --silent --show-error --output /dev/null